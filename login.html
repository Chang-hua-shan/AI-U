<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI+U | 數據後台管理登入</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style-dashboard.css">
</head>
<body class="login-page">

  <!-- Ambient Background Glow -->
  <div class="glow-sphere sphere-1"></div>
  <div class="glow-sphere sphere-2"></div>

  <!-- Login Container -->
  <main class="login-container">
    <div class="login-card">
      <header class="login-header">
        <a href="index.html" class="login-logo">
          <img src="assets/logo-kyimc.svg" alt="AI+U Logo" class="logo-img">
        </a>
        <h1 class="login-title">數據後台管理系統</h1>
        <p class="login-subtitle">請登入您的 AI+U 管理員帳戶</p>
      </header>

      <form id="login-form" class="login-form" novalidate>
        <div class="form-group">
          <label for="username" class="form-label">管理員帳號</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-user input-icon"></i>
            <input type="text" id="username" class="form-input" placeholder="請輸入管理員帳號" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">安全密碼</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="password" class="form-input" placeholder="請輸入安全密碼" required autocomplete="current-password">
            <button type="button" id="toggle-password" class="toggle-password-btn" aria-label="切換密碼顯示">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-login" id="btn-login">
            <span class="btn-text">驗證並登入後台</span>
            <i class="fa-solid fa-right-to-bracket login-icon"></i>
          </button>
        </div>
      </form>

      <footer class="login-footer">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> 返回官方首頁</a>
      </footer>
    </div>
  </main>

  <!-- Toast Notification -->
  <div class="toast" id="toast-notification">
    <i class="fa-solid fa-triangle-exclamation toast-icon"></i>
    <span class="toast-message">帳號或密碼輸入錯誤！</span>
  </div>

  <!-- JavaScript -->
  <script src="script-dashboard.js"></script>
</body>
</html>
